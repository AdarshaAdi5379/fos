version: '3.8'

services:
  # PostgreSQL Database (Production)
  postgres:
    image: postgres:15-alpine
    container_name: unbound-postgres
    environment:
      POSTGRES_DB: unbound
      POSTGRES_USER: unbound_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-unbound_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - unbound-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unbound_user -d unbound"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: unbound-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - unbound-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: unbound-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://unbound_user:${DB_PASSWORD:-unbound_secure_password}@postgres:5432/unbound
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-https://yourdomain.com}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_this}
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    ports:
      - "3000:3000"
    networks:
      - unbound-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: unbound-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./client/dist:/usr/share/nginx/html:ro
    networks:
      - unbound-network
    depends_on:
      - app
    restart: unless-stopped

  # Client Development Server
  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
      target: development
    container_name: unbound-client
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_WS_URL: ws://localhost:3000
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - unbound-network
    profiles:
      - development
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  unbound-network:
    driver: bridge